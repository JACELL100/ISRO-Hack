version: "3.9"

services:
  backend:
    build:
      context: ./backend # Dockerfile now lives inside backend/
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - ISRO_SCENE_SIZE=256
      # Uncomment to load real DFSAR data from a local directory:
      # - ISRO_DATA_DIR=/data/dfsar
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
