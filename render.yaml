services:
  # ─── Python FastAPI Backend ───────────────────────────────────────────────────
  - type: web
    name: isro-lunar-ice-backend
    runtime: python
    region: singapore          # closest to India; change to 'oregon' if preferred
    plan: free
    rootDir: backend           # all commands run from <repo>/backend/

    buildCommand: pip install -r requirements.txt

    # $PORT is injected automatically by Render on every deploy
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /         # Render pings / to confirm the service is up

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: "utf-8"
      - key: ISRO_SCENE_SIZE
        value: "256"           # 256×256 analysis grid — fits Render free RAM (512 MB)
      # Optional: restrict CORS to your Vercel domain after first deploy
      # - key: CORS_ORIGINS
      #   value: "https://your-app.vercel.app"
      # Optional: point to real DFSAR data if you upload it to Render disk
      # - key: ISRO_DATA_DIR
      #   value: "/data/dfsar"
